<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Yearly</title>
  <meta name="theme-color" content="#F4F1E8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />

  <!-- Broadsheet typography: Newsreader (serif) · Hanken Grotesk (sans) · JetBrains Mono (mono) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" />

  <!-- Design tokens + app styles -->
  <link rel="stylesheet" href="y/tokens.css" />
  <link rel="stylesheet" href="y/app.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- App (order matters: primitives -> screens -> root) -->
  <script type="text/babel" src="y/icons.jsx"></script>
  <script type="text/babel" src="y/ds.jsx"></script>
  <script type="text/babel" src="y/data.jsx"></script>
  <script type="text/babel" src="y/sync.jsx"></script>
  <script type="text/babel" src="y/calc.jsx"></script>
  <script type="text/babel" src="y/ui.jsx"></script>
  <script type="text/babel" src="y/fun.jsx"></script>
  <script type="text/babel" src="y/travel.jsx"></script>
  <script type="text/babel" src="y/home.jsx"></script>
  <script type="text/babel" src="y/addflow.jsx"></script>
  <script type="text/babel" src="y/analysis.jsx"></script>
  <script type="text/babel" src="y/settings.jsx"></script>
  <!-- DEV-ONLY sample data: injected on localhost ONLY (must run before app.jsx reads the store).
       In production this hostname check is false, so the tag is never written and y/devseed.jsx is
       never requested, cached, or executed — it is not part of the shipped app. -->
  <script>
    (function () {
      var h = location.hostname;
      if (h === "localhost" || h === "127.0.0.1" || h === "0.0.0.0" || h === "::1" || h === "[::1]") {
        document.write('<script type="text/babel" src="y/devseed.jsx"><\/script>');
      }
    })();
  </script>
  <script type="text/babel" src="y/app.jsx"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
