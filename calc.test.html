<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>calc.test — Yearly engine regression check</title>
  <style>
    body { font-family: ui-monospace, "SF Mono", Consolas, monospace; background: #111; color: #eee; padding: 24px; max-width: 640px; margin: 0 auto; }
    h1 { font-size: 18px; margin-bottom: 16px; }
    h2 { font-size: 11px; margin: 20px 0 4px; color: #666; text-transform: uppercase; letter-spacing: 0.08em; }
    .row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #1e1e1e; font-size: 12.5px; }
    .badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
    .pass { background: #1a3a1a; color: #4caf50; }
    .fail { background: #3a1a1a; color: #f44336; }
    .name { flex: 1; }
    .val { color: #666; font-size: 11px; }
    #summary { margin-top: 20px; font-size: 15px; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Yearly — calc engine tests</h1>
  <p style="font-size:12px;color:#666;margin-top:-8px">Serve over HTTP and open this file. Loads y/data.jsx + y/calc.jsx with no Babel.</p>
  <div id="results"></div>
  <div id="summary"></div>

  <!-- Plain script tags — no Babel needed; these files contain no JSX -->
  <script src="public/y/data.jsx?v=33"></script>
  <script src="public/y/calc.jsx?v=33"></script>
  <script>
    const container = document.getElementById('results');
    let passed = 0, failed = 0;

    function section(label) {
      const h = document.createElement('h2');
      h.textContent = label;
      container.appendChild(h);
    }

    function assert(name, cond, detail) {
      const ok = !!cond;
      if (ok) passed++; else failed++;
      console[ok ? 'log' : 'error']((ok ? 'PASS' : 'FAIL') + ': ' + name + (detail !== undefined ? ' — ' + detail : ''));
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML =
        `<span class="badge ${ok ? 'pass' : 'fail'}">${ok ? 'PASS' : 'FAIL'}</span>` +
        `<span class="name">${name}</span>` +
        (detail !== undefined ? `<span class="val">${detail}</span>` : '');
      container.appendChild(row);
    }

    // ---- Setup ----
    // Blank store: buildSeed() returns transactions:[] — used for blank-state edge-case tests only.
    const store = YData.buildSeed();
    // T12:00:00Z — noon UTC is safe across all UTC-11..UTC+13 timezones for localISO to return "2026-06-07".
    const asOf2026 = new Date('2026-06-07T12:00:00Z');
    const stats = YCalc.computeStats(store, 2026, asOf2026);
    const callouts = YCalc.buildCallouts(store, stats);
    const ids = new Set(callouts.map(c => c.id));

    // Rich fixture store — used wherever non-empty transaction data is needed.
    // Designed so all 7 main-budget detectors (trend/streak/mover/share/buffer/yoy/reqpace)
    // and the ceiling callout fire when asOf = 2026-06-07.
    //
    // mainTarget = ceiling(25000) − funPlanAnnual(3600) = 21400
    // lumpThreshold = 21400 × 0.02 = 428
    // Main transactions: 21 × 425 = 8925 (recurring) + 100 restaurants (Apr) + 500 restaurants lump (May)
    // Total main spent = 9525; fun spent = 330; total all = 9855.
    const richStore = {
      currentYear: 2026,
      people: [
        { id: 'joseph', name: 'Joseph', rates: [{ from: '2026-01', amount: 100 }], startMonth: '2026-01' },
        { id: 'marti',  name: 'Marti',  rates: [{ from: '2026-01', amount: 200 }], startMonth: '2026-01' },
      ],
      wishlist: [],
      years: {
        '2025': { ceiling: 23000, buffer: 0.04 },
        '2026': { ceiling: 25000, buffer: 0.04 },
      },
      density: 'balanced',
      templates: [],
      transactions: [
        // 2025 main — provide priorCum and yoy comparison
        { id: 'y1', date: '2025-01-15', description: 'Y1', amount_eur: 800, category: 'groceries', source: 'manual' },
        { id: 'y2', date: '2025-03-10', description: 'Y2', amount_eur: 600, category: 'groceries', source: 'manual' },
        { id: 'y3', date: '2025-05-20', description: 'Y3', amount_eur: 500, category: 'groceries', source: 'manual' },

        // 2026 main — Jan (4 × 425 = 1700)
        { id: 'r1',  date: '2026-01-05', description: 'Jan1', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r2',  date: '2026-01-10', description: 'Jan2', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r3',  date: '2026-01-20', description: 'Jan3', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r4',  date: '2026-01-25', description: 'Jan4', amount_eur: 425, category: 'groceries', source: 'manual' },

        // 2026 main — Feb (4 × 425 = 1700)
        { id: 'r5',  date: '2026-02-01', description: 'Feb1', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r6',  date: '2026-02-08', description: 'Feb2', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r7',  date: '2026-02-20', description: 'Feb3', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r8',  date: '2026-02-28', description: 'Feb4', amount_eur: 425, category: 'groceries', source: 'manual' },

        // 2026 main — Mar (4 × 425 = 1700)
        { id: 'r9',  date: '2026-03-03', description: 'Mar1', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r10', date: '2026-03-08', description: 'Mar2', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r11', date: '2026-03-12', description: 'Mar3', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r12', date: '2026-03-25', description: 'Mar4', amount_eur: 425, category: 'groceries', source: 'manual' },

        // 2026 main — Apr (3 × 425 + 100 restaurants = 1375)
        { id: 'r13', date: '2026-04-01', description: 'Apr1', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r14', date: '2026-04-09', description: 'Apr2', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r15', date: '2026-04-16', description: 'Apr3', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r16', date: '2026-04-22', description: 'AprRest', amount_eur: 100, category: 'restaurants', source: 'manual' },

        // 2026 main — May (2 × 425 + 500 restaurants lump + 425 = 1775)
        // r19 (500) > threshold (428) → winsorized out of rates, but included in spent
        { id: 'r17', date: '2026-05-01', description: 'May1', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r18', date: '2026-05-08', description: 'May2', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r19', date: '2026-05-15', description: 'MayRest', amount_eur: 500, category: 'restaurants', source: 'manual' },
        { id: 'r20', date: '2026-05-20', description: 'May4', amount_eur: 425, category: 'groceries', source: 'manual' },

        // 2026 main — late May/Jun streak (all after May 24 = within last 14 days of Jun 7)
        { id: 'r21', date: '2026-05-28', description: 'Streak1', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r22', date: '2026-06-02', description: 'Streak2', amount_eur: 425, category: 'groceries', source: 'manual' },
        { id: 'r23', date: '2026-06-05', description: 'Streak3', amount_eur: 425, category: 'groceries', source: 'manual' },

        // 2026 fun transactions
        { id: 'f1', date: '2026-03-15', description: 'Fun1', amount_eur: 80,  category: 'shopping', fun: true, person: 'joseph', source: 'manual' },
        { id: 'f2', date: '2026-05-20', description: 'Fun2', amount_eur: 250, category: 'shopping', fun: true, person: 'marti',  source: 'manual' },
      ],
    };
    const richStats    = YCalc.computeStats(richStore, 2026, asOf2026);
    const richCallouts = YCalc.buildCallouts(richStore, richStats);
    const richIds      = new Set(richCallouts.map(c => c.id));

    // ---- 2026 current-year stats (blank store — edge-case behavior) ----
    section('2026 current-year — computeStats basics (blank store)');
    assert('doy === 158', stats.doy === 158, 'got ' + stats.doy);
    assert('isCurrent === true', stats.isCurrent === true);
    assert('complete === false', stats.complete === false);
    assert('isFuture === false', stats.isFuture === false);

    // ceiling and mainTarget
    assert('ceiling === 25000', stats.ceiling === 25000, 'got ' + stats.ceiling);
    // funPlanAnnual = 12 × (100 joseph + 200 marti) = 3600
    assert('funPlanAnnual === 3600', stats.funPlanAnnual === 3600, 'got ' + stats.funPlanAnnual);
    assert('mainTarget === ceiling − funPlanAnnual (21400)', stats.mainTarget === 21400, 'got ' + stats.mainTarget);

    // projection = 0 when there are no transactions
    assert('projection === 0 with no transactions', stats.projection === 0, 'got ' + stats.projection);
    assert('trailingDailyRate exposed in stats', typeof stats.trailingDailyRate === 'number');
    assert('daysRemaining === daysInYear − doy', stats.daysRemaining === stats.daysInYear - stats.doy,
      'got ' + stats.daysRemaining + ' expected ' + (stats.daysInYear - stats.doy));
    assert('daysInYear === 365 (non-leap 2026)', stats.daysInYear === 365, 'got ' + stats.daysInYear);

    // status is vs mainTarget
    assert('status === "good" when projection = 0', stats.status === 'good', 'got "' + stats.status + '"');

    // combined fields
    assert('combinedProjection = projection + funProjection',
      Math.abs(stats.combinedProjection - (stats.projection + stats.funProjection)) < 0.01,
      stats.combinedProjection.toFixed(0) + ' vs ' + (stats.projection + stats.funProjection).toFixed(0));
    assert('combinedDelta = combinedProjection − ceiling',
      Math.abs(stats.combinedDelta - (stats.combinedProjection - stats.ceiling)) < 0.01);

    // requiredDailyToHit is null when projection ≤ mainTarget (blank store: projection=0)
    const reqBlank = YCalc.requiredDailyToHit(stats);
    assert('requiredDailyToHit is null when projection ≤ mainTarget', reqBlank === null, 'got ' + reqBlank);

    // ---- 2026 current-year stats (rich fixture — transaction-dependent behavior) ----
    section('2026 current-year — computeStats with transactions (rich fixture)');

    // Total main + fun 2026 up to Jun 7: main=9525, fun=330, total=9855.
    // (21×425 groceries + 100 restaurants Apr + 500 restaurants May) + (80+250 fun) = 9525+330
    const asOfStr = '2026-06-07';
    const richAllYearTxns = YCalc.yearTxns(richStore, 2026);
    const richTotalAll = richAllYearTxns.filter(t => t.date <= asOfStr).reduce((a, t) => a + t.amount_eur, 0);
    const richFunTxns   = richAllYearTxns.filter(t => t.fun && t.date <= asOfStr);
    const richFunDirect = richFunTxns.reduce((a, t) => a + t.amount_eur, 0);
    assert('rich fixture: total spent (main+fun) = 9855', Math.abs(richTotalAll - 9855) <= 1, 'got ' + richTotalAll.toFixed(2));
    assert('rich fixture: exactly 2 fun-tagged tx', richFunTxns.length === 2, 'got ' + richFunTxns.length);
    assert('rich fixture: richStats.spent excludes fun (main only)',
      Math.abs(richStats.spent + richFunDirect - richTotalAll) < 0.01,
      'main=' + richStats.spent.toFixed(2) + ' fun=' + richFunDirect.toFixed(2));
    assert('rich fixture: richStats.spent < richTotalAll (fun excluded)', richStats.spent < richTotalAll,
      richStats.spent.toFixed(2) + ' < ' + richTotalAll.toFixed(2));
    assert('rich fixture: funSpent > 0', richStats.funSpent > 0, 'got ' + richStats.funSpent.toFixed(2));
    assert('rich fixture: funProjection > 0 (current year)', richStats.funProjection > 0, 'got ' + richStats.funProjection.toFixed(2));
    assert('rich fixture: priorCum not null (2025 data present)', richStats.priorCum !== null);

    // projection should exceed mainTarget (designed so reqpace fires)
    assert('rich fixture: projection > mainTarget', richStats.projection > richStats.mainTarget,
      richStats.projection.toFixed(0) + ' > ' + richStats.mainTarget);
    const richReq = YCalc.requiredDailyToHit(richStats);
    assert('requiredDailyToHit non-null when projection > mainTarget', richReq !== null, 'got ' + richReq);
    assert('requiredDailyToHit positive', richReq !== null && richReq > 0, 'got ' + richReq);

    // ---- Trailing 60-day projection formula ----
    section('Trailing 60-day projection formula');
    const trailingStore = {
      currentYear: 2026,
      people: [],
      wishlist: [],
      years: { '2026': { ceiling: 25000, buffer: 0.0 } },
      density: 'balanced',
      templates: [],
      transactions: [
        // Jan: heavy (gym subscription lump sum)
        { id: 'tr1', date: '2026-01-15', description: 'Gym', amount_eur: 1000, category: 'gym', source: 'manual' },
        { id: 'tr2', date: '2026-01-20', description: 'Groceries', amount_eur: 1000, category: 'groceries', source: 'manual' },
        // Feb–Mar: moderate
        { id: 'tr3', date: '2026-02-15', description: 'Feb', amount_eur: 600, category: 'groceries', source: 'manual' },
        { id: 'tr4', date: '2026-03-15', description: 'Mar', amount_eur: 600, category: 'groceries', source: 'manual' },
        // Apr–May–early Jun: light (within the 60-day window ending Jun 7)
        { id: 'tr5', date: '2026-04-15', description: 'Apr', amount_eur: 500, category: 'groceries', source: 'manual' },
        { id: 'tr6', date: '2026-05-15', description: 'May', amount_eur: 500, category: 'groceries', source: 'manual' },
        { id: 'tr7', date: '2026-06-01', description: 'Jun', amount_eur: 200, category: 'groceries', source: 'manual' },
      ],
    };
    // asOf = Jun 7: doy=158; spent=4400 (all tx, lumps included in spent).
    // lumpThreshold = mainTarget × 0.02 = 25000 × 0.02 = 500 (people:[] → mainTarget=25000).
    // recurring (≤500): tr5(500)+tr6(500)+tr7(200) = €1200. tr1-tr4 exceed threshold → excluded from rates.
    // recurringYtdRate = 1200/158 ≈ 7.60/d; 60-day window = Apr 8 → Jun 7.
    // recurring in window: tr5(Apr15=500)+tr6(May15=500)+tr7(Jun1=200) = 1200 → rawTrailing=20/d.
    // yearWeight = 158/365 ≈ 0.433
    // blended = 7.60×0.433 + 20×0.567 ≈ 3.29 + 11.34 ≈ 14.63/d (vs old 23.39/d without winsorization)
    // daysRemaining=207; projNoBuffer ≈ 4400 + 14.63×207 ≈ 7428 (no buffer)
    const tStats = YCalc.computeStats(trailingStore, 2026, new Date('2026-06-07T12:00:00Z'));
    const yearWeight = tStats.doy / 365;
    const recurringSum = 500 + 500 + 200;  // tr5+tr6+tr7 — only tx at or below the €500 threshold
    const recurringYtdRate = recurringSum / tStats.doy;
    const rawTrailing = 1200 / 60;  // 20/d — same transactions (all ≤ threshold, so unchanged)
    const expectedBlended = recurringYtdRate * yearWeight + rawTrailing * (1 - yearWeight);
    assert('blended: spent === 4400', Math.abs(tStats.spent - 4400) < 0.01, 'got ' + tStats.spent);
    assert('blended: trailingDailyRate ≈ expectedBlended', Math.abs(tStats.trailingDailyRate - expectedBlended) < 0.5, 'got ' + tStats.trailingDailyRate.toFixed(2) + ' expected ' + expectedBlended.toFixed(2));
    assert('blended: daysRemaining === 207', tStats.daysRemaining === 207, 'got ' + tStats.daysRemaining);
    // New formula: projection = spent + blended×remaining×(1+buffer). buffer=0 here so no change.
    const expectedProj = tStats.spent + expectedBlended * tStats.daysRemaining * (1 + 0);
    assert('blended: projection ≈ spent + blended×remaining×(1+buffer)', Math.abs(tStats.projection - expectedProj) < 5, 'got ' + tStats.projection.toFixed(0));
    // Must be less than the old pure-YTD formula (4400/158×365 ≈ 10165) — front-loading de-weighted
    const oldLinear = tStats.spent / tStats.doy * 365;
    assert('blended < old linear for front-loaded spend', tStats.projection < oldLinear, tStats.projection.toFixed(0) + ' < ' + oldLinear.toFixed(0));

    // ---- Buffer on extrapolated portion only ----
    section('Buffer applies to extrapolated portion only (§1.3)');

    // (a) Dec 31: daysRemaining=0 → extrapolated=0 → projection must equal spent exactly
    const dec31Store = {
      currentYear: 2026,
      people: [],
      wishlist: [],
      years: { '2026': { ceiling: 25000, buffer: 0.04 } },
      density: 'balanced',
      templates: [],
      transactions: [
        { id: 'd1', date: '2026-03-15', description: 'A', amount_eur: 500, category: 'groceries', source: 'manual' },
        { id: 'd2', date: '2026-09-20', description: 'B', amount_eur: 800, category: 'groceries', source: 'manual' },
      ],
    };
    // asOf = Dec 31 local time, passed via T12:00:00Z so both UTC and UTC+ map to Dec 31
    const dec31Stats = YCalc.computeStats(dec31Store, 2026, new Date('2026-12-31T12:00:00Z'));
    assert('Dec31: daysRemaining === 0', dec31Stats.daysRemaining === 0, 'got ' + dec31Stats.daysRemaining);
    assert('Dec31: projection === spent (buffer ignored when daysRemaining=0)',
      Math.abs(dec31Stats.projection - dec31Stats.spent) < 0.001,
      'projection=' + dec31Stats.projection.toFixed(2) + ' spent=' + dec31Stats.spent.toFixed(2));
    assert('Dec31: spent > 0 (fixture not empty)', dec31Stats.spent > 0, 'got ' + dec31Stats.spent);

    // (b) Mid-year with nonzero buffer: projection = spent + blended×remaining×(1+buffer)
    const midYearStore = {
      currentYear: 2026,
      people: [],
      wishlist: [],
      years: { '2026': { ceiling: 25000, buffer: 0.04 } },
      density: 'balanced',
      templates: [],
      transactions: [
        { id: 'm1', date: '2026-01-15', description: 'A', amount_eur: 300, category: 'groceries', source: 'manual' },
        { id: 'm2', date: '2026-02-15', description: 'B', amount_eur: 300, category: 'groceries', source: 'manual' },
        { id: 'm3', date: '2026-03-15', description: 'C', amount_eur: 300, category: 'groceries', source: 'manual' },
      ],
    };
    // asOf = Jun 7 (doy=158); spent=900; all tx ≤ 25000×0.02=500 → recurringYtdRate=900/158
    // 60-day window (Apr 8→Jun 7): no tx → rawTrailing=0; yearWeight=158/365
    // blended = (900/158)×(158/365) + 0×(1−158/365) = 900/365
    const midStats = YCalc.computeStats(midYearStore, 2026, new Date('2026-06-07T12:00:00Z'));
    const midExpectedBlended = midStats.trailingDailyRate;
    const midExpectedProj = midStats.spent + midExpectedBlended * midStats.daysRemaining * 1.04;
    assert('mid-year buffer: projection = spent + blended×remaining×1.04',
      Math.abs(midStats.projection - midExpectedProj) < 0.5,
      'got ' + midStats.projection.toFixed(2) + ' expected ' + midExpectedProj.toFixed(2));
    // Sanity: projection must be > spent (we are mid-year with daysRemaining > 0)
    assert('mid-year buffer: projection > spent', midStats.projection > midStats.spent,
      midStats.projection.toFixed(2) + ' > ' + midStats.spent.toFixed(2));
    // projNoBuffer = spent + blended×remaining (no buffer)
    const midExpectedNoBuffer = midStats.spent + midExpectedBlended * midStats.daysRemaining;
    assert('mid-year buffer: projNoBuffer = spent + blended×remaining',
      Math.abs(midStats.projNoBuffer - midExpectedNoBuffer) < 0.5,
      'got ' + midStats.projNoBuffer.toFixed(2));
    // bufferAmt = extrapolated × buffer (not whole-sum × buffer)
    const midExtrapolated = midExpectedBlended * midStats.daysRemaining;
    assert('mid-year buffer: bufferAmt ≈ extrapolated × 0.04',
      Math.abs(midStats.bufferAmt - midExtrapolated * 0.04) < 0.5,
      'got ' + midStats.bufferAmt.toFixed(2) + ' expected ' + (midExtrapolated * 0.04).toFixed(2));

    // ---- rateForMonth boundaries ----
    section('rateForMonth');
    const personA = { id: 'a', name: 'A', startMonth: '2026-03', rates: [{ from: '2026-03', amount: 100 }, { from: '2026-06', amount: 150 }] };
    assert('before startMonth returns 0', YCalc.rateForMonth(personA, '2026-02') === 0, 'got ' + YCalc.rateForMonth(personA, '2026-02'));
    assert('at startMonth (first entry) returns 100', YCalc.rateForMonth(personA, '2026-03') === 100, 'got ' + YCalc.rateForMonth(personA, '2026-03'));
    assert('between entries returns first rate (100)', YCalc.rateForMonth(personA, '2026-05') === 100, 'got ' + YCalc.rateForMonth(personA, '2026-05'));
    assert('at second entry returns 150', YCalc.rateForMonth(personA, '2026-06') === 150, 'got ' + YCalc.rateForMonth(personA, '2026-06'));
    assert('after second entry still returns 150', YCalc.rateForMonth(personA, '2027-01') === 150, 'got ' + YCalc.rateForMonth(personA, '2027-01'));

    // ---- computeFun ----
    section('computeFun — balance and negative case');

    const funFixtureStore = {
      currentYear: 2026,
      people: [
        { id: 'joseph', name: 'Joseph', rates: [{ from: '2026-01', amount: 100 }], startMonth: '2026-01' }
      ],
      wishlist: [],
      transactions: [
        { id: 'fx1', date: '2026-03-15', description: 'Fun thing', amount_eur: 80, category: 'shopping', fun: true, person: 'joseph', source: 'manual' },
        { id: 'fx2', date: '2026-05-20', description: 'Big fun thing', amount_eur: 250, category: 'shopping', fun: true, person: 'joseph', source: 'manual' },
      ],
      years: { '2026': { ceiling: 25000, buffer: 0.04 } },
      density: 'balanced',
      templates: [],
    };
    // Balance: Jan–Jun (6 months) × 100 = 600; spent = 80+250=330; balance = 270
    const funResult = YCalc.computeFun(funFixtureStore, new Date('2026-06-07T12:00:00Z'));
    assert('computeFun balance = 270', Math.abs(funResult.people[0].balance - 270) < 0.01, 'got ' + funResult.people[0].balance);
    assert('computeFun monthlyRate = 100', funResult.people[0].monthlyRate === 100, 'got ' + funResult.people[0].monthlyRate);
    assert('computeFun usedThisMonth = 0 (no Jun tx)', funResult.people[0].usedThisMonth === 0, 'got ' + funResult.people[0].usedThisMonth);
    assert('computeFun spentAllTime = 330', Math.abs(funResult.people[0].spentAllTime - 330) < 0.01, 'got ' + funResult.people[0].spentAllTime);
    assert('computeFun funSpentYTD = 330', Math.abs(funResult.funSpentYTD - 330) < 0.01, 'got ' + funResult.funSpentYTD);
    assert('computeFun funProjection > 0 (current year)', funResult.funProjection > 0, 'got ' + funResult.funProjection);

    // Negative balance: Marti starts June with 200/mo rate but spends 500 in June
    const negFixtureStore = {
      currentYear: 2026,
      people: [
        { id: 'marti', name: 'Marti', rates: [{ from: '2026-06', amount: 200 }], startMonth: '2026-06' }
      ],
      wishlist: [],
      transactions: [
        { id: 'fx3', date: '2026-06-01', description: 'Big purchase', amount_eur: 500, category: 'shopping', fun: true, person: 'marti', source: 'manual' },
      ],
      years: { '2026': { ceiling: 25000, buffer: 0.04 } },
      density: 'balanced',
      templates: [],
    };
    // Balance: Jun × 200 = 200; spent = 500; balance = -300
    const negResult = YCalc.computeFun(negFixtureStore, new Date('2026-06-07T12:00:00Z'));
    assert('computeFun negative balance = -300', Math.abs(negResult.people[0].balance - (-300)) < 0.01, 'got ' + negResult.people[0].balance);

    // ---- mainTarget = ceiling − funPlanAnnual ----
    section('mainTarget derivation');
    assert('stats.mainTarget === stats.ceiling − stats.funPlanAnnual',
      Math.abs(stats.mainTarget - (stats.ceiling - stats.funPlanAnnual)) < 0.01,
      stats.mainTarget + ' === ' + stats.ceiling + ' − ' + stats.funPlanAnnual);

    // ---- combinedProjection = projection + funProjection ----
    section('combined projection');
    assert('combinedProjection = projection + funProjection',
      Math.abs(stats.combinedProjection - (stats.projection + stats.funProjection)) < 0.01);
    assert('combinedDeltaPct ≈ combinedDelta / ceiling',
      Math.abs(stats.combinedDeltaPct - stats.combinedDelta / stats.ceiling) < 0.0001);

    // ---- 2026 rich fixture callout IDs (all detectors fire) ----
    section('2026 rich fixture — buildCallouts (all detectors)');
    ['trend', 'streak', 'mover', 'share', 'buffer', 'yoy', 'reqpace'].forEach(id => {
      assert('id "' + id + '" present', richIds.has(id), '[' + [...richIds].join(', ') + ']');
    });
    assert('no "future" callout in current year', !richIds.has('future'));

    // ceiling callout
    assert('"ceiling" callout present (current year)', richIds.has('ceiling'), '[' + [...richIds].join(', ') + ']');
    assert('"ceiling" callout is first (pinned top)', richCallouts[0] && richCallouts[0].id === 'ceiling');

    // ---- 2099 future-year ----
    section('2099 future year');
    const store99 = Object.assign({}, store, {
      years: Object.assign({}, store.years, { '2099': { ceiling: 30000, buffer: 0.04 } }),
    });
    const stats99 = YCalc.computeStats(store99, 2099, asOf2026);
    assert('future: spent === 0', stats99.spent === 0, 'got ' + stats99.spent);
    assert('future: projection === 0', stats99.projection === 0, 'got ' + stats99.projection);
    assert('future: status === "good"', stats99.status === 'good', 'got "' + stats99.status + '"');
    assert('future: isFuture === true', stats99.isFuture === true);
    assert('future: ceiling === 30000', stats99.ceiling === 30000, 'got ' + stats99.ceiling);

    const callouts99 = YCalc.buildCallouts(store99, stats99);
    assert('future: exactly 1 callout', callouts99.length === 1, 'got ' + callouts99.length);
    assert('future: id === "future"', callouts99[0] && callouts99[0].id === 'future', 'got "' + (callouts99[0] && callouts99[0].id) + '"');
    assert('future: severity === "good"', callouts99[0] && callouts99[0].severity === 'good');

    // ---- ceiling detector — over ceiling ----
    section('ceiling detector');
    // Small ceiling + large rates + a fun tx → combined projection >> ceiling.
    // A fun transaction is required to bypass the blank-store guard
    // (!(upto.length===0 && funSpent===0)); the fixture design intentionally has no main txns.
    const overCeilingStore = Object.assign({}, store, {
      people: [{ id: 'joseph', name: 'Joseph', rates: [{ from: '2026-01', amount: 2000 }], startMonth: '2026-01' }],
      // ceiling=100 → funProjection (~€226 linear from €100 on day 5) >> ceiling; funSpent>0 bypasses guard
      years: Object.assign({}, store.years, { '2026': { ceiling: 100, buffer: 0.04 } }),
      transactions: [
        { id: 'oc1', date: '2026-01-05', description: 'Fun', amount_eur: 100, category: 'shopping', fun: true, person: 'joseph', source: 'manual' },
      ],
    });
    const overStats = YCalc.computeStats(overCeilingStore, 2026, asOf2026);
    const overCallouts = YCalc.buildCallouts(overCeilingStore, overStats);
    assert('ceiling detector present when combined > ceiling', overCallouts.some(c => c.id === 'ceiling'));
    assert('ceiling detector is top callout when over', overCallouts[0] && overCallouts[0].id === 'ceiling');
    const overCeil = overCallouts.find(c => c.id === 'ceiling');
    assert('ceiling severity watch/alert when over', overCeil && (overCeil.severity === 'watch' || overCeil.severity === 'alert'));
    assert('ceiling drill is fun section', overCeil && overCeil.drill && overCeil.drill.section === 'fun');

    // Well under ceiling → good/info; joseph @ €1/mo, ceiling €200k; fun tx triggers guard
    const underCeilingStore = Object.assign({}, store, {
      people: [{ id: 'joseph', name: 'Joseph', rates: [{ from: '2026-01', amount: 1 }], startMonth: '2026-01' }],
      years: Object.assign({}, store.years, { '2026': { ceiling: 200000, buffer: 0.04 } }),
      transactions: [
        { id: 'uc1', date: '2026-01-05', description: 'Fun', amount_eur: 1, category: 'shopping', fun: true, person: 'joseph', source: 'manual' },
      ],
    });
    const underStats = YCalc.computeStats(underCeilingStore, 2026, asOf2026);
    const underCallouts = YCalc.buildCallouts(underCeilingStore, underStats);
    assert('ceiling detector present when well under', underCallouts.some(c => c.id === 'ceiling'));
    const underCeil = underCallouts.find(c => c.id === 'ceiling');
    assert('ceiling severity good/info when well under', underCeil && (underCeil.severity === 'good' || underCeil.severity === 'info'));

    // §5.6 — over-ceiling text always mentions "ceiling"
    assert('§5.6: over-ceiling text contains "ceiling"',
      overCeil && overCeil.text.includes('ceiling'),
      overCeil ? overCeil.text.substring(0, 80) : 'no callout');

    // §5.6 — clamp: when overBy/monthsLeft >> funPlanAnnual/12, text names "main spending"
    // joseph @€1/mo → maxFunTrim=€1/mo; 3×€5000 main tx → large overBy → trimPer >> €1/mo
    const bigOverStore = {
      currentYear: 2026,
      people: [{ id: 'joseph', name: 'Joseph', rates: [{ from: '2026-01', amount: 1 }], startMonth: '2026-01' }],
      wishlist: [],
      years: { '2026': { ceiling: 1000, buffer: 0.0 } },
      density: 'balanced',
      templates: [],
      transactions: [
        { id: 'bo1', date: '2026-01-10', description: 'A', amount_eur: 5000, category: 'groceries', source: 'manual' },
        { id: 'bo2', date: '2026-03-10', description: 'B', amount_eur: 5000, category: 'groceries', source: 'manual' },
        { id: 'bo3', date: '2026-05-10', description: 'C', amount_eur: 5000, category: 'groceries', source: 'manual' },
        { id: 'bof', date: '2026-01-05', description: 'F', amount_eur: 1,    category: 'shopping',  fun: true, person: 'joseph', source: 'manual' },
      ],
    };
    const bigOverStats    = YCalc.computeStats(bigOverStore, 2026, asOf2026);
    const bigOverCallouts = YCalc.buildCallouts(bigOverStore, bigOverStats);
    const bigOverCeil     = bigOverCallouts.find(c => c.id === 'ceiling');
    assert('§5.6 clamp: fixture has ceiling callout', bigOverCeil !== undefined,
      '[' + bigOverCallouts.map(c => c.id).join(', ') + ']');
    assert('§5.6 clamp: clamped text mentions "main spending"',
      bigOverCeil && bigOverCeil.text.includes('main spending'),
      bigOverCeil ? bigOverCeil.text.substring(0, 120) : 'no callout');
    assert('§5.6 clamp: clamped text still contains "ceiling"',
      bigOverCeil && bigOverCeil.text.includes('ceiling'));

    // §5.1 — reqpace text prefix (use richCallouts — reqpace is designed to fire there)
    const reqpaceCallout = richCallouts.find(c => c.id === 'reqpace');
    assert('§5.1: reqpace text starts with "Main budget:"',
      reqpaceCallout && reqpaceCallout.text.startsWith('Main budget:'),
      reqpaceCallout ? reqpaceCallout.text.substring(0, 60) : 'no reqpace callout');

    // §5.1 — trend text prefix (use richCallouts — trend is designed to fire there)
    const trendCallout = richCallouts.find(c => c.id === 'trend');
    assert('§5.1: trend text starts with "Main budget:"',
      trendCallout && trendCallout.text.startsWith('Main budget:'),
      trendCallout ? trendCallout.text.substring(0, 60) : 'no trend callout');

    // §5.1 — streak text prefix (use richCallouts — streak is designed to fire there)
    const streakCallout = richCallouts.find(c => c.id === 'streak');
    assert('§5.1: streak text starts with "Main budget:"',
      streakCallout && streakCallout.text.startsWith('Main budget:'),
      streakCallout ? streakCallout.text.substring(0, 60) : 'no streak callout');

    // ---- migrateStore ----
    section('migrateStore (idempotent)');
    const oldBackup = {
      version: 1, currentYear: 2026, density: 'balanced',
      years: { '2026': { target: 25000, buffer: 0.04 } },
      transactions: [{ id: 'x1', date: '2026-01-15', description: 'Test', amount_eur: 100, category: 'groceries', source: 'manual' }],
      templates: [],
    };
    YData.migrateStore(oldBackup);
    assert('migrateStore: target → ceiling', oldBackup.years['2026'].ceiling === 25000, 'got ' + oldBackup.years['2026'].ceiling);
    assert('migrateStore: target deleted', oldBackup.years['2026'].target === undefined);
    assert('migrateStore: people injected', Array.isArray(oldBackup.people) && oldBackup.people.length === 2);
    assert('migrateStore: wishlist injected', Array.isArray(oldBackup.wishlist));
    // idempotent — run again
    YData.migrateStore(oldBackup);
    assert('migrateStore idempotent: ceiling unchanged', oldBackup.years['2026'].ceiling === 25000);
    assert('migrateStore idempotent: no duplicate people', oldBackup.people.length === 2);

    // ---- Phase 9: DST-safe dayOfYear ----
    section('Phase 9 — DST-safe dayOfYear (§3.3)');
    // 2026-07-01 is day 182 of 2026 (Jan31+Feb28+Mar31+Apr30+May31+Jun30+1=182).
    // The DST bug (Math.floor on local-time difference) would return 181 in UTC+2/+3 summer timezone.
    // UTC arithmetic (Date.UTC both ends) is immune regardless of timezone.
    const dstDoy = YCalc.dayOfYear(YCalc.parseDate('2026-07-01'));
    assert('dayOfYear("2026-07-01") === 182 (DST-safe)', dstDoy === 182, 'got ' + dstDoy);
    assert('dayOfYear("2026-01-01") === 1', YCalc.dayOfYear(YCalc.parseDate('2026-01-01')) === 1, 'got ' + YCalc.dayOfYear(YCalc.parseDate('2026-01-01')));
    assert('dayOfYear("2026-12-31") === 365 (non-leap)', YCalc.dayOfYear(YCalc.parseDate('2026-12-31')) === 365, 'got ' + YCalc.dayOfYear(YCalc.parseDate('2026-12-31')));
    assert('daysInYear(2024) === 366 (leap)', YCalc.daysInYear(2024) === 366, 'got ' + YCalc.daysInYear(2024));
    assert('daysInYear(2026) === 365 (non-leap)', YCalc.daysInYear(2026) === 365, 'got ' + YCalc.daysInYear(2026));
    assert('daysInYear(2000) === 366 (div-400 leap)', YCalc.daysInYear(2000) === 366, 'got ' + YCalc.daysInYear(2000));
    assert('daysInYear(1900) === 365 (div-100 non-leap)', YCalc.daysInYear(1900) === 365, 'got ' + YCalc.daysInYear(1900));
    assert('dayOfYear("2024-12-31") === 366 (leap year last day)', YCalc.dayOfYear(YCalc.parseDate('2024-12-31')) === 366, 'got ' + YCalc.dayOfYear(YCalc.parseDate('2024-12-31')));

    // ---- Phase 9: leap year computeStats (§3.4) ----
    section('Phase 9 — leap year computeStats (§3.4)');
    // 2024 was a leap year; asOf is 2025-01-01 so 2024 is a complete year (currentYear=2026)
    const leap2024Store = {
      currentYear: 2026,
      people: [],
      wishlist: [],
      years: { '2024': { ceiling: 25000, buffer: 0.04 } },
      density: 'balanced',
      templates: [],
      transactions: [
        { id: 'l1', date: '2024-01-15', description: 'Jan',   amount_eur: 200, category: 'groceries', source: 'manual' },
        { id: 'l2', date: '2024-06-01', description: 'Jun',   amount_eur: 300, category: 'groceries', source: 'manual' },
        { id: 'l3', date: '2024-12-31', description: 'Dec31', amount_eur: 100, category: 'groceries', source: 'manual' },
      ],
    };
    const leap2024Stats = YCalc.computeStats(leap2024Store, 2024);
    assert('leap 2024 complete: doy === 366', leap2024Stats.doy === 366, 'got ' + leap2024Stats.doy);
    assert('leap 2024 complete: daysInYear === 366', leap2024Stats.daysInYear === 366, 'got ' + leap2024Stats.daysInYear);
    assert('leap 2024 complete: Dec 31 tx included in spent', Math.abs(leap2024Stats.spent - 600) < 0.01, 'got ' + leap2024Stats.spent);
    assert('leap 2024 complete: daysRemaining === 0', leap2024Stats.daysRemaining === 0, 'got ' + leap2024Stats.daysRemaining);
    assert('leap 2024 complete: projection === spent (complete year)', Math.abs(leap2024Stats.projection - leap2024Stats.spent) < 0.01, 'got ' + leap2024Stats.projection);

    // Current-year leap fixture: daysRemaining === daysInYear − doy
    // Use 2024 as currentYear to treat it as in-progress; asOf = 2024-07-01 (doy=183)
    const leap2024CurrentStore = {
      currentYear: 2024,
      people: [],
      wishlist: [],
      years: { '2024': { ceiling: 25000, buffer: 0.0 } },
      density: 'balanced',
      templates: [],
      transactions: [],
    };
    const leap2024AsOf = new Date('2024-07-01T12:00:00Z');
    const leap2024CurStats = YCalc.computeStats(leap2024CurrentStore, 2024, leap2024AsOf);
    const expectedDoy2024 = YCalc.dayOfYear(leap2024AsOf);
    assert('leap 2024 current: daysRemaining === 366 − doy', leap2024CurStats.daysRemaining === 366 - expectedDoy2024, 'daysRemaining=' + leap2024CurStats.daysRemaining + ' doy=' + expectedDoy2024);
    assert('leap 2024 current: daysInYear === 366', leap2024CurStats.daysInYear === 366, 'got ' + leap2024CurStats.daysInYear);

    // ---- §3.1 regression: complete-year Dec-31 inclusion ----
    section('§3.1 regression — complete year includes Dec 31 transactions');
    // Historically, toISOString() on new Date(year, 11, 31) in UTC+ timezones produced
    // "YYYY-12-30", silently dropping every Dec 31 transaction from completed-year spent.
    // Fix: localISO() uses local-time getDate() and always returns "YYYY-12-31".
    // This fixture detects a regression to the old toISOString() path.
    const cy2025Store = {
      currentYear: 2026,
      people: [],
      wishlist: [],
      years: { '2025': { ceiling: 23000, buffer: 0.04 } },
      density: 'balanced',
      templates: [],
      transactions: [
        { id: 'cy1', date: '2025-12-30', description: 'Dec30', amount_eur: 100, category: 'groceries', source: 'manual' },
        { id: 'cy2', date: '2025-12-31', description: 'Dec31', amount_eur: 200, category: 'groceries', source: 'manual' },
      ],
    };
    // No asOfDate passed: computeStats uses localISO(new Date(2025, 11, 31)) for a complete year.
    const cy2025Stats = YCalc.computeStats(cy2025Store, 2025);
    assert('§3.1: complete year doy === 365', cy2025Stats.doy === 365, 'got ' + cy2025Stats.doy);
    assert('§3.1: Dec 31 tx included in spent (spent = 300)', Math.abs(cy2025Stats.spent - 300) < 0.01, 'got ' + cy2025Stats.spent);
    assert('§3.1: projection === spent (complete year, no extrapolation)', Math.abs(cy2025Stats.projection - cy2025Stats.spent) < 0.001);

    // ---- §3.2 regression: January trend guard ----
    section('§3.2 regression — trend detector skipped before doy 28');
    // Before the doy>28 guard, projectionAsOf(stats, 28) on Jan 15 used a reference date in
    // Dec 2025 → refSpent=0 → trendDelta = huge projection − 0 → "trend" fired spuriously.
    // Fix: `const proj4 = stats.doy > 28 ? projectionAsOf(stats, 28) : null` — skip detector.
    const janStore = {
      currentYear: 2026,
      people: [],
      wishlist: [],
      years: { '2026': { ceiling: 25000, buffer: 0.04 } },
      density: 'balanced',
      templates: [],
      transactions: [
        { id: 'j1', date: '2026-01-05', description: 'J1', amount_eur: 300, category: 'groceries', source: 'manual' },
        { id: 'j2', date: '2026-01-10', description: 'J2', amount_eur: 400, category: 'groceries', source: 'manual' },
        { id: 'j3', date: '2026-01-13', description: 'J3', amount_eur: 500, category: 'groceries', source: 'manual' },
      ],
    };
    // asOf = Jan 15 (doy = 15 ≤ 28) → trend must be absent regardless of spend level
    const janAsOf = new Date('2026-01-15T12:00:00Z');
    const janStats = YCalc.computeStats(janStore, 2026, janAsOf);
    const janCallouts = YCalc.buildCallouts(janStore, janStats);
    assert('§3.2: Jan 15 doy === 15', janStats.doy === 15, 'got ' + janStats.doy);
    assert('§3.2: trend absent before doy 28', !janCallouts.some(c => c.id === 'trend'),
      '[' + janCallouts.map(c => c.id).join(', ') + ']');

    // ---- §2.1 regression: lump-sum winsorization limits projection sensitivity ----
    section('§2.1 regression — lump-sum winsorization limits projection sensitivity');
    // Without winsorization, a single €5 000 lump sum included in the trailing-rate calculation
    // inflates projection by up to rate × daysRemaining ≈ 4× the lump's own size.
    // With winsorization, tx > 2% of mainTarget are excluded from the blended rate;
    // their only effect on projection is the 1× addition to spent.
    const lumpBaseStore = {
      currentYear: 2026,
      people: [],
      wishlist: [],
      years: { '2026': { ceiling: 25000, buffer: 0.04 } },
      density: 'balanced',
      templates: [],
      transactions: [
        { id: 'lb1', date: '2026-01-15', description: 'B1', amount_eur: 400, category: 'groceries', source: 'manual' },
        { id: 'lb2', date: '2026-03-15', description: 'B2', amount_eur: 400, category: 'groceries', source: 'manual' },
        { id: 'lb3', date: '2026-05-15', description: 'B3', amount_eur: 400, category: 'groceries', source: 'manual' },
      ],
    };
    const lumpStore = Object.assign({}, lumpBaseStore, {
      transactions: lumpBaseStore.transactions.concat([
        { id: 'lump', date: '2026-03-01', description: 'Lump', amount_eur: 5000, category: 'travel', source: 'manual' },
      ]),
    });
    const lumpBaseStats = YCalc.computeStats(lumpBaseStore, 2026, new Date('2026-06-07T12:00:00Z'));
    const lumpStats     = YCalc.computeStats(lumpStore,     2026, new Date('2026-06-07T12:00:00Z'));
    const lumpDiff      = lumpStats.projection - lumpBaseStats.projection;
    const lumpBuffer    = lumpBaseStore.years['2026'].buffer;
    assert('§2.1: spent differs by exactly 5000',
      Math.abs(lumpStats.spent - lumpBaseStats.spent - 5000) < 0.01,
      'diff=' + (lumpStats.spent - lumpBaseStats.spent).toFixed(0));
    // Projection difference must be ≤ 5000 × (1+buffer) + 1.
    // Without winsorization the lump inflates the rate → diff approaches ~8 000.
    assert('§2.1: projection diff ≤ 5000 × (1+buffer) + 1',
      lumpDiff <= 5000 * (1 + lumpBuffer) + 1,
      'diff=' + lumpDiff.toFixed(0) + ' limit=' + (5000 * (1 + lumpBuffer) + 1).toFixed(0));

    // ---- §1.1 regression: neededMonthlyCap formula ----
    section('§1.1 regression — neededMonthlyCap helper');
    // neededMonthlyCap(stats) = max(0, (mainTarget − spentBeforeCurrentMonth) / (12 − currentMonth))
    // "spentBefore" covers only completed months so the current month is not penalised twice.
    const capStore = {
      currentYear: 2026,
      people: [],
      wishlist: [],
      years: { '2026': { ceiling: 25000, buffer: 0.04 } },
      density: 'balanced',
      templates: [],
      transactions: [
        { id: 'ca1', date: '2026-01-15', description: 'C1', amount_eur: 2000, category: 'groceries', source: 'manual' },
        { id: 'ca2', date: '2026-02-15', description: 'C2', amount_eur: 1500, category: 'groceries', source: 'manual' },
        { id: 'ca3', date: '2026-03-15', description: 'C3', amount_eur: 1800, category: 'groceries', source: 'manual' },
        { id: 'ca4', date: '2026-04-15', description: 'C4', amount_eur: 1200, category: 'groceries', source: 'manual' },
        { id: 'ca5', date: '2026-05-15', description: 'C5', amount_eur: 1600, category: 'groceries', source: 'manual' },
        { id: 'ca6', date: '2026-06-05', description: 'C6', amount_eur: 300,  category: 'groceries', source: 'manual' },
      ],
    };
    // asOf = Jun 7 (m=5 = June, index 5); spentBefore = Jan+Feb+Mar+Apr+May = 8100; mainTarget = 25000
    // neededMonthlyCap = (25000 − 8100) / (12 − 5) = 16900/7 ≈ 2414.29
    const capStats  = YCalc.computeStats(capStore, 2026, new Date('2026-06-07T12:00:00Z'));
    const capResult = YCalc.neededMonthlyCap(capStats);
    const capM = capStats.asOf.getMonth();  // 5 (June)
    const capSpentBefore = capStats.byMonth.slice(0, capM).reduce((a, x) => a + x.amount, 0);
    const capExpected = Math.max(0, (capStats.mainTarget - capSpentBefore) / (12 - capM));
    assert('§1.1: spentBefore = Jan+Feb+Mar+Apr+May = 8100',
      Math.abs(capSpentBefore - 8100) < 0.01, 'got ' + capSpentBefore);
    assert('§1.1: neededMonthlyCap excludes current-month spend from numerator',
      Math.abs(capResult - capExpected) < 0.01,
      'got ' + capResult.toFixed(2) + ' expected ' + capExpected.toFixed(2));
    assert('§1.1: neededMonthlyCap ≈ 2414.29',
      Math.abs(capResult - 16900 / 7) < 0.01, 'got ' + capResult.toFixed(2));

    // ---- §6.2 regression: funProjection capped, not unbounded linear ----
    section('§6.2 regression — funProjection capped by allowance system');
    // Without the cap, a single large fun tx in January extrapolates linearly to ~€22k for the year,
    // inflating combinedProjection by ~7× what the allowance system could ever permit.
    // Fix: funProjection = min(linear, funSpentYTD + max(0, Σbalances) + futureAccruals)
    //   Joseph: Jan+Feb accrued = 200; spent = 2000; balance = −1800
    //   max(0, balance) = 0; futureAccruals Mar-Dec = 10×100 = 1000
    //   cap = 2000 + 0 + 1000 = 3000; linear = 2000/32×365 ≈ 22812 >> cap
    const funCapStore = {
      currentYear: 2026,
      people: [
        { id: 'joseph', name: 'Joseph', rates: [{ from: '2026-01', amount: 100 }], startMonth: '2026-01' },
      ],
      wishlist: [],
      years: { '2026': { ceiling: 25000, buffer: 0.04 } },
      density: 'balanced',
      templates: [],
      transactions: [
        { id: 'fc1', date: '2026-01-10', description: 'Big fun', amount_eur: 2000, category: 'shopping', fun: true, person: 'joseph', source: 'manual' },
      ],
    };
    // asOf = Feb 1 (doy=32)
    const funCapAsOf   = new Date('2026-02-01T12:00:00Z');
    const funCapStats  = YCalc.computeStats(funCapStore, 2026, funCapAsOf);
    const funLinear    = 2000 / 32 * 365;
    assert('§6.2: linear extrapolation >> 10000 (sanity)',
      funLinear > 10000, 'linear=' + funLinear.toFixed(0));
    assert('§6.2: funProjection === 3000 (capped, not linear ~22812)',
      Math.abs(funCapStats.funProjection - 3000) < 1,
      'got ' + funCapStats.funProjection.toFixed(0) + ' linear=' + funLinear.toFixed(0));
    assert('§6.2: funProjection < linear extrapolation',
      funCapStats.funProjection < funLinear,
      funCapStats.funProjection.toFixed(0) + ' < ' + funLinear.toFixed(0));

    // ---- §6.1 regression: pre-startMonth fun tx ignored in balance ----
    section('§6.1 regression — fun tx before startMonth excluded from balance');
    // A fun tx dated before a person's startMonth must not subtract from their balance.
    // Before the fix, allFunTxns was not filtered by startMonth, so a pre-start tx would
    // subtract with no matching accrual, producing a negative balance incorrectly.
    const preStartStore = {
      currentYear: 2026,
      people: [
        // Joseph starts in March 2026 at €100/mo
        { id: 'joseph', name: 'Joseph', rates: [{ from: '2026-03', amount: 100 }], startMonth: '2026-03' },
      ],
      wishlist: [],
      years: { '2026': { ceiling: 25000, buffer: 0.04 } },
      density: 'balanced',
      templates: [],
      transactions: [
        // This tx is dated before Joseph's startMonth (2026-03-01) — must be ignored
        { id: 'ps1', date: '2026-01-15', description: 'Pre-start fun', amount_eur: 200, category: 'shopping', fun: true, person: 'joseph', source: 'manual' },
        // This tx is after startMonth and should count
        { id: 'ps2', date: '2026-04-10', description: 'Post-start fun', amount_eur: 50, category: 'shopping', fun: true, person: 'joseph', source: 'manual' },
      ],
    };
    // asOf = Jun 7: accrued Mar+Apr+May+Jun = 4×100 = 400; only ps2 counts (ps1 pre-start ignored); balance = 350
    const preStartResult = YCalc.computeFun(preStartStore, new Date('2026-06-07T12:00:00Z'));
    assert('§6.1: pre-start tx excluded — balance = 350 (not 150)',
      Math.abs(preStartResult.people[0].balance - 350) < 0.01,
      'got ' + preStartResult.people[0].balance);
    assert('§6.1: spentAllTime = 50 (pre-start tx not counted)',
      Math.abs(preStartResult.people[0].spentAllTime - 50) < 0.01,
      'got ' + preStartResult.people[0].spentAllTime);

    // Also verify via computeStats: funProjectionFor must also exclude the pre-start tx
    const preStartStats = YCalc.computeStats(preStartStore, 2026, new Date('2026-06-07T12:00:00Z'));
    // funSpent in stats = fun txns for year up to asOf. Pre-start tx IS in 2026 but before startMonth.
    // The fix applies to the per-person spentAll in funProjectionFor (cap calculation), not funSpent directly.
    // funProjection cap = funSpentYTD + max(0, balance) + futureAccruals; balance uses filtered spend.
    // balance = 350; futureAccruals Jul–Dec = 6×100=600; cap = 50 + 350 + 600 = 1000
    // linear = funSpentYTD(250) / 158 × 365 ≈ 577.5 < cap 1000 → funProjection ≈ linear
    // But main check: if pre-start tx were included, balance would be 150, cap = 50 + 150 + 600 = 800
    // Both cap values > linear so funProjection ≈ linear regardless — test balance directly instead.
    assert('§6.1: computeStats funSpent counts pre-start tx (it is in 2026)',
      Math.abs(preStartStats.funSpent - 250) < 0.01,
      'got ' + preStartStats.funSpent.toFixed(2));

    // ---- §6.4 regression: computeFun asOf-relative year classification ----
    section('§6.4 regression — computeFun uses asOfDate for year classification');
    // Before the fix: `realYear = new Date().getFullYear()` (wall clock) → passing a historical
    // asOfDate still used the real current year, misclassifying the target year as complete.
    // Fix: `realYear = asOf.getFullYear()` → year is classified relative to asOf.
    // Test: pass asOf = mid-2024 with currentYear=2024. 2024 < asOf.getFullYear() is false,
    // and 2024 === asOf.getFullYear() is true → isCurrent → funProjectionFor path (not complete path).
    // A complete-year path returns funSpentYTD directly, producing funProjection === funSpentYTD.
    // The current-year (linear/cap) path returns funProjection > funSpentYTD when doy < daysInYear.
    const hist2024Store = {
      currentYear: 2024,
      people: [
        { id: 'joseph', name: 'Joseph', rates: [{ from: '2024-01', amount: 100 }], startMonth: '2024-01' },
      ],
      wishlist: [],
      years: { '2024': { ceiling: 25000, buffer: 0.04 } },
      density: 'balanced',
      templates: [],
      transactions: [
        { id: 'h1', date: '2024-03-15', description: 'Fun 2024', amount_eur: 80, category: 'shopping', fun: true, person: 'joseph', source: 'manual' },
      ],
    };
    // asOf = 2024-06-15 (mid-year); doy=167 (well before Dec 31) → current-year path → funProjection > funSpentYTD
    const hist2024AsOf   = new Date('2024-06-15T12:00:00Z');
    const hist2024Result = YCalc.computeFun(hist2024Store, hist2024AsOf);
    assert('§6.4: historical asOf (mid-2024) → funProjection > funSpentYTD (current-year path)',
      hist2024Result.funProjection > hist2024Result.funSpentYTD,
      'funProjection=' + hist2024Result.funProjection.toFixed(0) + ' funSpentYTD=' + hist2024Result.funSpentYTD.toFixed(0));

    // ---- §7.2 regression: aggregateByCategory one-pass counts ----
    section('§7.2 regression — aggregateByCategory counts computed in one pass');
    // 3 groceries + 1 transport: catList must report count=3 for groceries and count=1 for transport.
    // Also: a tx with an unknown category must land in "general" with count=1.
    const catCountStore = {
      currentYear: 2026,
      people: [],
      wishlist: [],
      years: { '2026': { ceiling: 25000, buffer: 0.04 } },
      density: 'balanced',
      templates: [],
      transactions: [
        { id: 'cc1', date: '2026-01-10', description: 'G1',  amount_eur: 100, category: 'groceries',  source: 'manual' },
        { id: 'cc2', date: '2026-02-10', description: 'G2',  amount_eur: 150, category: 'groceries',  source: 'manual' },
        { id: 'cc3', date: '2026-03-10', description: 'G3',  amount_eur: 200, category: 'groceries',  source: 'manual' },
        { id: 'cc4', date: '2026-04-10', description: 'T1',  amount_eur: 80,  category: 'transport',  source: 'manual' },
        { id: 'cc5', date: '2026-05-10', description: 'Unk', amount_eur: 50,  category: 'bogus-cat',  source: 'manual' },
      ],
    };
    const ccStats = YCalc.computeStats(catCountStore, 2026, new Date('2026-06-07T12:00:00Z'));
    const groceriesEntry  = ccStats.catList.find(c => c.id === 'groceries');
    const transportEntry  = ccStats.catList.find(c => c.id === 'transport');
    const generalEntry    = ccStats.catList.find(c => c.id === 'general');
    assert('§7.2: groceries count === 3', groceriesEntry && groceriesEntry.count === 3,
      'got ' + (groceriesEntry ? groceriesEntry.count : 'missing'));
    assert('§7.2: transport count === 1', transportEntry && transportEntry.count === 1,
      'got ' + (transportEntry ? transportEntry.count : 'missing'));
    assert('§7.2: bogus-cat aggregates under general', generalEntry !== undefined,
      '[' + ccStats.catList.map(c => c.id).join(', ') + ']');
    assert('§7.2: general count === 1 (from bogus-cat tx)', generalEntry && generalEntry.count === 1,
      'got ' + (generalEntry ? generalEntry.count : 'missing'));
    // catList is sorted amount descending: groceries (450) > transport (80) > general (50)
    assert('§7.2: catList sorted by amount descending',
      ccStats.catList[0].id === 'groceries' && ccStats.catList[1].id === 'transport',
      ccStats.catList.map(c => c.id + ':' + c.amount).join(', '));

    // ---- Summary ----
    const total = passed + failed;
    const summary = document.getElementById('summary');
    summary.style.color = failed === 0 ? '#4caf50' : '#f44336';
    summary.textContent = passed + '/' + total + ' passed' + (failed > 0 ? ' · ' + failed + ' FAILED' : ' — all clear');
  </script>
</body>
