<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>calc.test — Yearly engine regression check</title>
  <style>
    body { font-family: ui-monospace, "SF Mono", Consolas, monospace; background: #111; color: #eee; padding: 24px; max-width: 640px; margin: 0 auto; }
    h1 { font-size: 18px; margin-bottom: 16px; }
    h2 { font-size: 11px; margin: 20px 0 4px; color: #666; text-transform: uppercase; letter-spacing: 0.08em; }
    .row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #1e1e1e; font-size: 12.5px; }
    .badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
    .pass { background: #1a3a1a; color: #4caf50; }
    .fail { background: #3a1a1a; color: #f44336; }
    .name { flex: 1; }
    .val { color: #666; font-size: 11px; }
    #summary { margin-top: 20px; font-size: 15px; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Yearly — calc engine tests</h1>
  <p style="font-size:12px;color:#666;margin-top:-8px">Serve over HTTP and open this file. Loads y/data.jsx + y/calc.jsx with no Babel.</p>
  <div id="results"></div>
  <div id="summary"></div>

  <!-- Plain script tags — no Babel needed; these files contain no JSX -->
  <script src="y/data.jsx"></script>
  <script src="y/calc.jsx"></script>
  <script>
    const container = document.getElementById('results');
    let passed = 0, failed = 0;

    function section(label) {
      const h = document.createElement('h2');
      h.textContent = label;
      container.appendChild(h);
    }

    function assert(name, cond, detail) {
      const ok = !!cond;
      if (ok) passed++; else failed++;
      console[ok ? 'log' : 'error']((ok ? 'PASS' : 'FAIL') + ': ' + name + (detail !== undefined ? ' — ' + detail : ''));
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML =
        `<span class="badge ${ok ? 'pass' : 'fail'}">${ok ? 'PASS' : 'FAIL'}</span>` +
        `<span class="name">${name}</span>` +
        (detail !== undefined ? `<span class="val">${detail}</span>` : '');
      container.appendChild(row);
    }

    // ---- Setup ----
    const store = YData.buildSeed('2026-06-07');
    // Use UTC midnight so asOfStr = "2026-06-07" is timezone-independent
    const asOf2026 = new Date('2026-06-07T00:00:00Z');
    const stats = YCalc.computeStats(store, 2026, asOf2026);
    const callouts = YCalc.buildCallouts(store, stats);
    const ids = new Set(callouts.map(c => c.id));

    // ---- 2026 current-year stats ----
    section('2026 current-year — computeStats');
    assert('doy === 158', stats.doy === 158, 'got ' + stats.doy);
    assert('spent ≈ 10950 (±1)', Math.abs(stats.spent - 10950) <= 1, 'got ' + stats.spent.toFixed(2));
    assert('status === "watch"', stats.status === 'watch', 'got "' + stats.status + '"');
    assert('projection ≈ 26308 (±5)', Math.abs(stats.projection - 26308) <= 5, 'got ' + stats.projection.toFixed(0));
    assert('isCurrent === true', stats.isCurrent === true);
    assert('complete === false', stats.complete === false);
    assert('isFuture === false', stats.isFuture === false);
    assert('target === 25000', stats.target === 25000, 'got ' + stats.target);
    assert('priorCum not null (2025 data present)', stats.priorCum !== null);

    const req = YCalc.requiredDailyToHit(stats);
    assert('requiredDailyToHit ≈ 68 (±1)', req !== null && Math.abs(req - 68) <= 1, 'got ' + (req !== null ? req.toFixed(1) : 'null'));

    // ---- 2026 callout IDs ----
    section('2026 current-year — buildCallouts');
    ['trend', 'streak', 'mover', 'share', 'buffer', 'yoy', 'reqpace'].forEach(id => {
      assert('id "' + id + '" present', ids.has(id), '[' + [...ids].join(', ') + ']');
    });
    assert('no "future" callout in current year', !ids.has('future'));

    // ---- 2099 future-year ----
    section('2099 future year');
    const store99 = Object.assign({}, store, {
      years: Object.assign({}, store.years, { '2099': { target: 30000, buffer: 0.04 } }),
    });
    const stats99 = YCalc.computeStats(store99, 2099, asOf2026);
    assert('future: spent === 0', stats99.spent === 0, 'got ' + stats99.spent);
    assert('future: projection === 0', stats99.projection === 0, 'got ' + stats99.projection);
    assert('future: status === "good"', stats99.status === 'good', 'got "' + stats99.status + '"');
    assert('future: isFuture === true', stats99.isFuture === true);

    const callouts99 = YCalc.buildCallouts(store99, stats99);
    assert('future: exactly 1 callout', callouts99.length === 1, 'got ' + callouts99.length);
    assert('future: id === "future"', callouts99[0] && callouts99[0].id === 'future', 'got "' + (callouts99[0] && callouts99[0].id) + '"');
    assert('future: severity === "good"', callouts99[0] && callouts99[0].severity === 'good');

    // ---- Summary ----
    const total = passed + failed;
    const summary = document.getElementById('summary');
    summary.style.color = failed === 0 ? '#4caf50' : '#f44336';
    summary.textContent = passed + '/' + total + ' passed' + (failed > 0 ? ' · ' + failed + ' FAILED' : ' — all clear');
  </script>
</body>
</html>
